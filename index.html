<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea del tiempo:evolución de la paleontología</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <header>
        <h1>Cronología de la Paleontología y sus Tecnologías</h1>
        <p>Pasa el ratón sobre los puntos destacados para ver la información.</p>
    </header>

    <main class="timeline-wrapper">
        <div class="img-container">
            <img src="linea.png" alt="Línea del Tiempo Paleontológica" class="main-image">

            <div class="hotspot" style="top: 72%; left: 26.8%;" 
                 data-title="Georgius Agricola (1546)"
                 data-body="Propuso una clasificación basada en propiedades físicas (dureza, lustre) y creía en la acción de fluidos cementantes terrestres[cite: 1117, 1118].">
            </div>

            <div class="hotspot" style="top: 72%; left: 32.3%;" 
                data-title="Carl Linneo (1735)"
                data-body="En su 'Systema Naturae', los fósiles fueron integrados formalmente en la clasificación biológica, tratándolos como seres vivientes.">
            </div>

            <div class="hotspot" style="top: 72%; left: 36.6%;" 
                 data-title="Niels Stensen (1667)"
                 data-body="Demostró el origen orgánico de los fósiles comparando 'lenguas de piedra' con dientes de tiburón reales[cite: 1149, 1150].">
            </div>

             <div class="hotspot" style="top: 72%; left: 41.1%;" 
                data-title="William Smith (1815)"
                data-body="Descubrió que los fósiles permiten identificar estratos de forma precisa y creó el primer gran mapa geológico detallado[cite: 1238, 1239].">
            </div>

            <div class="hotspot" style="top: 72%; left: 45%;" 
                 data-title="Georges Cuvier (1812)"
                 data-body="Estableció la prueba definitiva de la extinción mediante el estudio comparativo de elefantes y mamuts fósiles[cite: 1205, 1227].">
            </div>

            <div class="hotspot" style="top: 72%; left: 49%;" 
                 data-title="Charles Darwin (1859)"
                 data-body="Su obra transformó la paleontología en el estudio del desarrollo de la vida y la reconstrucción de filogenias[cite: 969, 970].">
            </div>

            <div class="hotspot" style="top: 72%; left: 59%;" 
                 data-title="Tectónica de Placas (1960-1975)"
                 data-body="Permitió entender los patrones de distribución biológica global y reconstruir paleogeografías realistas[cite: 877, 928].">
            </div>

            <div class="hotspot" style="top: 72%; left: 66.7%;" 
                data-title="Tomografía Computarizada (CT)"
                data-body="Técnica no destructiva que genera imágenes 3D para estudiar el interior de fósiles y reconstruir tejidos blandos sin dañarlos.">
            </div>

            <div class="hotspot" style="top: 72%; left: 77.4%;" 
                 data-title="Machine Learning e IA"
                 data-body="Tecnología de crecimiento exponencial usada para taxonomía automatizada y procesamiento de 'Big Data' como la PBDB[cite: 140, 461, 463].">
            </div>
            
            <div class="hotspot" style="top: 72%; left: 72.4%;" 
                 data-title="Paleogenómica (2022)"
                 data-body="Se logró secuenciar el ADN más antiguo registrado (2 millones de años) en sedimentos de Groenlandia[cite: 54, 355].">
            </div>
        </div>

    <div id="arcaico" class="hotspot" 
         data-title="Eón Arcaico (4,000 - 2,500 Ma)" 
         data-body="Evolución microbiana temprana. En los años 60 se confirmó que los estromatolitos eran biológicos[cite: 896, 1307, 1308]."></div>

    <div id="proterozoico" class="hotspot" 
         data-title="Eón Proterozoico (2,500 - 541 Ma)" 
         data-body="Surgimiento de organismos complejos y la fauna de Ediacara. En 1965 se descubrió microbiota en la Formación Gunflint[cite: 897, 900, 1301].">
    </div>

    <div id="paleozoico" class="hotspot" 
         data-title="Era Paleozoica (541 - 252 Ma)" 
         data-body="Explosión cámbrica y planes corporales modernos. Lyell realizó cálculos de biostratigrafía numérica en 1830[cite: 54, 908, 1301].">
    </div>

    <div id="mesozoico" class="hotspot" 
         data-title="Era Mesozoica (252 - 66 Ma)" 
         data-body="Era de los dinosaurios. Destaca la Guerra Marsh-Cope en los 1870s y la extinción masiva K-T por un asteroide[cite: 794, 1002, 1301]."></div>

    <div id="cenozoico" class="hotspot" 
         data-title="Era Cenozoica (66 Ma - Presente)" 
         data-body="Evolución de mamíferos y humanos. Hitos: Neanderthal (1857) y Homo erectus (1890)[cite: 1009, 1011, 1304]."></div>
</div>
    </main>

    <footer>
        <p>Estudio basado en Abdelhady et al. (2024) y síntesis de paleobiología clásica.</p>
    </footer>

</body>
</html>
